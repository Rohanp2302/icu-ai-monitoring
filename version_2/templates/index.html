<!DOCTYPE html>
<html class="dark" lang="en">

<head>

<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>ICU Clinical Decision Support Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<script>
tailwind.config = {
darkMode:"class",
theme:{
extend:{
colors:{
primary:"#1392ec",
"background-light":"#f6f7f8",
"background-dark":"#101a22",
"card-dark":"#1c2a35",
"card-border":"#2c3e4e",
"text-secondary":"#92b2c9",
danger:"#ef4444",
warning:"#f59e0b",
success:"#10b981"
},
fontFamily:{display:["Inter","sans-serif"]}
}
}
}
</script>

<style>
body{min-height:max(884px,100dvh)}
</style>

</head>


<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased overflow-x-hidden">

<div class="relative flex h-full min-h-screen w-full flex-col max-w-md mx-auto bg-background-light dark:bg-background-dark border-x border-gray-800 shadow-2xl">


<header class="sticky top-0 z-50 bg-[#111b22]/95 backdrop-blur-md border-b border-[#233948]">

<div class="flex items-center justify-between p-4 pb-2">

<button class="text-white">
<span class="material-symbols-outlined">arrow_back</span>
</button>

<h1 class="text-white text-lg font-bold">
ICU Dashboard
</h1>

</div>


<div class="px-4 pb-4">

<div class="flex items-start justify-between gap-4">

<div>
<h2 class="text-white text-lg font-bold">John Doe</h2>
<p class="text-text-secondary text-xs">MRN: 849302 • Bed 402-A</p>
</div>

<div class="flex flex-col items-end gap-1">

<div id="alertBadge" class="inline-flex items-center gap-1 rounded-full bg-danger/10 px-2.5 py-1 text-xs font-semibold text-danger border border-danger/20">
Loading
</div>

<span id="riskScore" class="text-xs font-bold text-white">
--
</span>

</div>

</div>

</div>

</header>



<main class="flex-1 flex flex-col gap-6 p-4 overflow-y-auto pb-24">


<section>

<h3 class="text-white text-base font-bold flex items-center gap-2 mb-3">
<span class="material-symbols-outlined text-primary">ssid_chart</span>
Predictive Risk Analysis
</h3>

<div class="bg-card-dark border border-card-border rounded-xl p-4">

<p class="text-text-secondary text-xs uppercase">
AI Summary
</p>

<p id="summaryText" class="text-white text-sm mt-2">
Loading patient analysis...
</p>

</div>

</section>



<section>

<h3 class="text-white text-base font-bold mb-3">
Organ Status
</h3>

<div class="grid grid-cols-3 gap-3">

<div class="bg-card-dark border border-card-border rounded-xl p-3 text-center">
<p class="text-xs text-text-secondary">Heart</p>
<p id="heartStatus" class="text-white text-sm font-semibold">--</p>
</div>

<div class="bg-card-dark border border-card-border rounded-xl p-3 text-center">
<p class="text-xs text-text-secondary">Lungs</p>
<p id="lungsStatus" class="text-white text-sm font-semibold">--</p>
</div>

<div class="bg-card-dark border border-card-border rounded-xl p-3 text-center">
<p class="text-xs text-text-secondary">Kidneys</p>
<p id="kidneyStatus" class="text-white text-sm font-semibold">--</p>
</div>

</div>

</section>



<section>

<h3 class="text-white text-base font-bold mb-3">
Mortality Risk
</h3>

<div class="bg-card-dark border border-card-border rounded-xl p-4 text-center">

<span id="mortalityRisk" class="text-3xl font-bold text-white">
--
</span>

</div>

</section>



</main>



<script>

async function loadPatient(){

const response = await fetch("/patient");
const data = await response.json();

document.getElementById("summaryText").innerText = data.summary;

document.getElementById("heartStatus").innerText = data.heart;
document.getElementById("lungsStatus").innerText = data.lungs;
document.getElementById("kidneyStatus").innerText = data.kidneys;

let riskPercent = (data.risk*100).toFixed(1) + "%";

document.getElementById("riskScore").innerText = riskPercent;
document.getElementById("mortalityRisk").innerText = riskPercent;

document.getElementById("alertBadge").innerText = data.alert;

}

loadPatient();

</script>


</body>

</html>
